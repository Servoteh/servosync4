name: deploy-backend

# Monorepo verzija (servosync4). Adaptirano iz nekadašnjeg servosync/backend deploy.yml:
#  - jedan checkout (frontend je sad u istom repou pod frontend/ — nema zasebnog checkout-a
#    servosync/frontend ni FRONTEND_REPO_TOKEN secret-a),
#  - trigger samo na backend/** da FE-only push ne rebuild-uje backend (isto ponašanje kao pre;
#    :3000 bake se osvežava pri sledećem backend deploju — ako zatreba, dodaj "frontend/**" ispod).
# Frontend (glavni prod front) deployuje Cloudflare Git-integracija zasebno (root dir frontend/).
#
# Runner mora biti registrovan na servosync4 (ili org-level) — vidi docs/MONOREPO_MIGRACIJA.md, Faza 3.
on:
  push:
    branches: [main]
    paths:
      # Deploy okida SAMO stvarna backend izmena. test/docs se NE rebuild-uju u prod
      # (pokriva ih ci-backend.yml, ubuntu-hosted) — negativni obrasci ih izbacuju iz backend/**.
      - "backend/**"
      - "!backend/test/**"
      - "!backend/docs/**"
  # Ručni okidač: kad se menja sam deploy proces (ovaj workflow) NE želimo auto-restart prod-a,
  # pa self-referenca više nije u paths; deploy workflow-izmene se voze ručno ili uz stvarni kod.
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, servosync]
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Build, migrate, restart
        working-directory: backend
        run: |
          set -euo pipefail
          # Bake the frontend static export into the backend image for same-origin :3000 serving.
          # In the monorepo the frontend lives at ../frontend (no separate checkout / token needed).
          # Best-effort: if the frontend build fails, ship an empty dir → backend stays API-only.
          # .gitkeep guarantees a non-empty dir so `COPY frontend-static` never fails.
          rm -rf frontend-static && mkdir -p frontend-static && touch frontend-static/.gitkeep
          if [ -f ../frontend/package.json ] \
             && docker run --rm -u "$(id -u):$(id -g)" -e HOME=/tmp -e npm_config_cache=/tmp/.npm \
                  -v "$PWD/../frontend":/work -w /work node:22-bookworm-slim \
                  sh -c "npm ci && npm run build" \
             && [ -d ../frontend/out ]; then
            cp -a ../frontend/out/. frontend-static/
            echo "frontend baked into image"
          else
            # Namerno best-effort (backend ostaje deployabilan), ALI glasno — tihi API-only
            # je 21.07.2026 ostavio LAN/offline bez logina 1h. Health-check korak niže
            # tvrdo padne na /login != 200, pa ovaj warning + taj fail zajedno hvataju otkaz.
            echo "::warning::frontend build PAO → API-only image. LAN/offline login NEĆE raditi. Health-check će pasti. Uzrok obično: [id] ruta bez generateStaticParams (output:export)."
            echo "no/failed frontend build → API-only"
          fi
          # Ship backend source (incl. frontend-static) into the compose deploy dir (build context ./backend).
          rsync -a --delete \
            --exclude .git --exclude node_modules --exclude dist \
            ./ "$HOME/servosync/backend/"
          cd "$HOME/servosync"
          docker compose build backend
          # Apply any new migrations (idempotent — no-op when none pending).
          docker compose run --rm backend npx prisma migrate deploy
          docker compose up -d backend

      # Health check MORA da padne glasno na defektan deploy (incident 21.07.2026:
      # backend crash-loop + prazan frontend prošli su "tiho", firma 1h bez logina).
      # Daj kontejneru vremena da se stabilizuje pa proveri i WEB (API) i LAN (frontend).
      - name: Health check (backend boot + frontend baked)
        run: |
          set -euo pipefail
          # Sačekaj da backend stvarno digne /api (do 60s) — ne fiksni sleep.
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:3000/api > /dev/null 2>&1; then break; fi
            if [ "$i" = "20" ]; then
              echo "::error::backend /api ne odgovara ni posle 60s — crash-loop? (dist/main.js?)"
              docker logs --tail 20 servosync-backend 2>&1 || true
              exit 1
            fi
            sleep 3
          done
          echo "backend healthy (/api 200)"
          # Kontejner NE SME biti u restart-petlji.
          st=$(docker inspect -f '{{.State.Status}}:{{.State.Restarting}}' servosync-backend 2>/dev/null || echo "unknown:true")
          echo "container state: $st"
          case "$st" in *:true) echo "::error::kontejner u restart-petlji"; docker logs --tail 20 servosync-backend; exit 1 ;; esac
          # LAN/offline: /login MORA vratiti 200 (frontend baked). 404 = API-only = LAN mrtav.
          code=$(curl -fsS -o /dev/null -w '%{http_code}' http://localhost:3000/login 2>/dev/null || echo 000)
          echo "front /login -> $code"
          if [ "$code" != "200" ]; then
            echo "::error::/login=$code — frontend NIJE baked (LAN/offline login bi bio mrtav). Static export pao? (generateStaticParams za [id] rute)"
            exit 1
          fi
          echo "OK — backend + frontend (LAN) oba živa."
